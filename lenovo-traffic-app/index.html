<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lenovo Traffic Impact Calendar</title>
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Traffic Impact Calendar</h1>
        <p>Lenovo Center Events — <span id="current-month-display"></span></p>
      </header>
      
      <main>
        <div id="status">Loading events...</div>
        
        <div id="calendar-container" class="hidden">
           <div class="calendar-header">
             <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
           </div>
           <div id="calendar-grid" class="calendar-grid"></div>
        </div>
      </main>
      
      <footer>
        <p>Data provided by Lenovo Center Calendar RSS</p>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
